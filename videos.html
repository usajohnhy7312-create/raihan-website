<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raihan Rapido Wala - Videos</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #081224 0%, #10203a 45%, #14213d 100%);
      color: #ffffff;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .backgroundGlow {
      position: fixed;
      border-radius: 999px;
      filter: blur(40px);
      opacity: 0.25;
      pointer-events: none;
      z-index: 0;
    }

    .glowOne {
      width: 300px;
      height: 300px;
      background: #2563eb;
      top: -50px;
      left: -100px;
    }

    .glowTwo {
      width: 300px;
      height: 300px;
      background: #ff3333;
      bottom: -50px;
      right: -100px;
    }

    .header-nav {
      width: 100%;
      max-width: 600px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      position: relative;
      z-index: 1;
    }

    .back-btn {
      background: rgba(255, 255, 255, 0.12);
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      font-size: 0.9rem;
      transition: all 0.2s ease;
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: translateX(-2px);
    }

    .page-title {
      font-size: 1.5rem;
      font-weight: 900;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      background: linear-gradient(135deg, #ff3333, #ff6666);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .video-container {
      width: 100%;
      max-width: 600px;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 24px;
      padding: 30px 20px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
      position: relative;
      z-index: 1;
      margin-bottom: 20px;
      text-align: center;
    }

    /* Locked Box Style */
    .lock-icon-box {
      font-size: 3.5rem;
      margin-bottom: 15px;
    }

    /* Premium Play Button Style */
    .watch-btn {
      display: inline-block;
      width: 100%;
      background: linear-gradient(135deg, #e11d48, #be123c);
      color: white;
      border: none;
      padding: 16px 20px;
      font-size: 1.1rem;
      font-weight: 800;
      border-radius: 16px;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 6px 20px rgba(225, 29, 72, 0.4);
      transition: all 0.2s ease;
      margin-top: 15px;
    }

    .watch-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(225, 29, 72, 0.6);
    }

    .video-info {
      margin-top: 20px;
      text-align: left;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      padding-top: 15px;
    }

    .video-title {
      font-size: 1.2rem;
      font-weight: 800;
      margin-bottom: 6px;
      color: #ffffff;
    }

    .video-desc {
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.7);
      line-height: 1.4;
    }
  </style>
</head>
<body>

  <div class="backgroundGlow glowOne"></div>
  <div class="backgroundGlow glowTwo"></div>

  <div class="header-nav">
    <a href="index.html" class="back-btn">← Home</a>
    <h1 class="page-title">Exclusive Video</h1>
    <div style="width: 75px;"></div>
  </div>

  <div class="video-container">
    <div class="lock-icon-box">🔞</div>
    
    <a href="https://drive.google.com/file/d/1zNXO-LpDN0UFwv5v9cY4J-btBELyEV62/preview" target="_blank" class="watch-btn">
      ▶ Watch Full Video
    </a>
    
    <div class="video-info">
      <h2 class="video-title">Heavy Porn Video</h2>
      <p class="video-desc">Premium local ride operator streaming live layout updates.</p>
    </div>
  </div>

</body>
</html>
