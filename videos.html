<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Videos - StreamZone</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f0f0f;
            color: #fff;
            padding: 20px;
        }

        header {
            padding: 10px 0 30px 0;
            border-bottom: 1px solid #2f2f2f;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            color: #ff0000;
            font-size: 24px;
        }

        .back-btn {
            background-color: #333;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .grid-item {
            background: #171717;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
            border: 1px solid #222;
        }

        .grid-item:hover {
            transform: scale(1.03);
        }

        .grid-item video {
            width: 100%;
            height: 160px;
            object-fit: cover;
            background: #000;
        }

        .grid-info {
            padding: 12px;
        }

        .grid-title {
            font-size: 15px;
            font-weight: 600;
            line-height: 1.3;
            margin-bottom: 5px;
        }

        .grid-meta {
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>

    <header>
        <h1>StreamZone - Videos</h1>
        <a href="index.html" class="back-btn">← Home</a>
    </header>

    <div class="video-grid">
        
        <div class="grid-item" onclick="playVideo(this)">
            <video src="https://www.w3schools.com/html/mov_bbb.mp4" muted loop></video>
            <div class="grid-info">
                <p class="grid-title">Sample Video 1 (Click to Play Landscape)</p>
                <p class="grid-meta">Admin • 10K views</p>
            </div>
        </div>

        <div class="grid-item" onclick="playVideo(this)">
            <video src="https://www.w3schools.com/html/movie.mp4" muted loop></video>
            <div class="grid-info">
                <p class="grid-title">Sample Video 2 (Click to Play Landscape)</p>
                <p class="grid-meta">Admin • 5K views</p>
            </div>
        </div>

    </div>

    <script>
        function playVideo(element) {
            var videoElement = element.querySelector('video');
            videoElement.controls = true;
            videoElement.muted = false;

            if (videoElement.requestFullscreen) {
                videoElement.requestFullscreen();
            } else if (videoElement.webkitRequestFullscreen) {
                videoElement.webkitRequestFullscreen();
            } else if (videoElement.msRequestFullscreen) {
                videoElement.msRequestFullscreen();
            }

            videoElement.play();
        }

        document.addEventListener('fullscreenchange', exitHandler);
        document.addEventListener('webkitfullscreenchange', exitHandler);

        function exitHandler() {
            if (!document.fullscreenElement && !document.webkitIsFullScreen) {
                var allVideos = document.querySelectorAll('video');
                allVideos.forEach(function(video) {
                    video.pause();
                    video.controls = false;
                    video.muted = true;
                });
            }
        }
    </script>
</body>
</html>
